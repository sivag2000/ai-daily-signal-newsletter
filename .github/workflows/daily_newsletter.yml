# GitHub Actions workflow to run the Daily AI News Scheduler in the cloud.
name: Daily AI News Scheduler

on:
  schedule:
    # Runs daily at 12:30 UTC (6:00 PM IST). You can adjust this time as needed.
    - cron: '30 12 * * *'
  # Allows you to manually trigger the workflow from the Actions tab on GitHub.
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install all required Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Recreate config.json and google_credentials.json from GitHub Secrets
      - name: Create Config and Credentials files
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$CONFIG_JSON" ]; then
            printf '%s' "$CONFIG_JSON" > config.json
          fi
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json
          fi

      # Step 5: Run the scheduler immediately and exit
      - name: Run News Scheduler
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scheduler.py --now

      # Step 6: Commit and push the generated newsletter files back to the repo
      - name: Commit and Push Newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          git diff --staged --quiet || git commit -m "newsletter: add edition for $(date +%Y-%m-%d)"
          git push
